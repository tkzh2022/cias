server:
  port: 8080

spring:
  application:
    name: cs-server
  data:
    redis:
      host: localhost
      port: 6379
  kafka:
    bootstrap-servers: localhost:9092

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

app:
  redis:
    enabled: false
  kafka:
    enabled: false
    topic: cs-chat-events
  llm:
    cloud-enabled: false
    api-url: ""
    api-key: ""
    fast-model: gpt-4o-mini
    strong-model: gpt-4.1
  rate-limit:
    requests-per-window: 20
    window-seconds: 1

resilience4j:
  circuitbreaker:
    instances:
      llm:
        sliding-window-size: 20
        failure-rate-threshold: 50
        wait-duration-in-open-state: 5s
  retry:
    instances:
      llm:
        max-attempts: 2
        wait-duration: 100ms
